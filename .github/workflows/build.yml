name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build with PyInstaller
        run: uv run pyinstaller nmr_conformer_fit.spec

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: nmr_conformer_fit-macos
          path: dist/nmr_conformer_fit

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: nmr_conformer_fit-windows
          path: dist/nmr_conformer_fit.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: nmr_conformer_fit-macos
          path: artifacts/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: nmr_conformer_fit-windows
          path: artifacts/windows

      - name: Rename artifacts
        run: |
          mv artifacts/macos/nmr_conformer_fit artifacts/nmr_conformer_fit-macos
          mv artifacts/windows/nmr_conformer_fit.exe artifacts/nmr_conformer_fit-windows.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/nmr_conformer_fit-macos
            artifacts/nmr_conformer_fit-windows.exe
          generate_release_notes: true
